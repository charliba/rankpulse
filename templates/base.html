<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RankPulse{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --rp-primary: #2563eb;
            --rp-secondary: #0f172a;
            --rp-accent: #10b981;
            --rp-warning: #f59e0b;
            --rp-danger: #ef4444;
        }
        body { background: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; }
        .navbar-rp { background: var(--rp-secondary); }
        .card { border: none; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .score-badge { font-size: 1.5rem; font-weight: 700; }
        .score-good { color: var(--rp-accent); }
        .score-mid { color: var(--rp-warning); }
        .score-bad { color: var(--rp-danger); }
        .stat-card { text-align: center; padding: 1.5rem; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-card .stat-label { font-size: 0.85rem; color: #64748b; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-rp">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'core:dashboard' %}">
                <i class="bi bi-graph-up-arrow"></i> RankPulse
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'admin:index' %}">
                    <i class="bi bi-gear"></i> Admin
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4">
        <small>RankPulse v1.0 — Traffic Administration System</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
