{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'core:project_alerts' project.id %}" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-900">{{ page_title }}</h1>
    </div>

    <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-5">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Alerta</label>
            <input type="text" name="name" value="{{ rule.name|default:'' }}" required
                   placeholder="Ex: CPC alto no Google Ads"
                   class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Métrica</label>
            <select name="metric" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary">
                {% for value, label in metric_choices %}
                <option value="{{ value }}" {% if rule.metric == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Condição</label>
            <select name="condition" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary">
                {% for value, label in condition_choices %}
                <option value="{{ value }}" {% if rule.condition == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Limite</label>
            <input type="number" name="threshold" step="0.01" value="{{ rule.threshold|default:'0' }}" required
                   class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary">
            <p class="text-xs text-gray-400 mt-1">Valor absoluto (R$, cliques, etc.) ou percentual conforme condição.</p>
        </div>

        <div class="flex items-center gap-3">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="notify_email" {% if rule.notify_email %}checked{% endif %}
                       class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary/30">
                <span class="text-sm text-gray-700">Notificar por email</span>
            </label>
        </div>

        {% if rule %}
        <div class="flex items-center gap-3">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="is_active" {% if rule.is_active %}checked{% endif %}
                       class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary/30">
                <span class="text-sm text-gray-700">Alerta ativo</span>
            </label>
        </div>
        {% endif %}

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
            <a href="{% url 'core:project_alerts' project.id %}"
               class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">
                Cancelar
            </a>
            <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primary-dark transition-colors">
                {% if rule %}Salvar{% else %}Criar Alerta{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
